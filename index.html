<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট - পারফেক্ট ফিট উইথ গ্যাপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            #print-area { display: block !important; width: 100%; }

            .receipt-copy { 
                height: 2.9in !important; 
                max-height: 2.9in !important;
                width: 100% !important;
                padding: 8px 15px !important;
                border: 1px dashed #000;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: space-between; /* এটি সাইন নিচে আটকে রাখবে */
                box-sizing: border-box;
                page-break-inside: avoid;
            }

            .spacer { height: 0.5in !important; display: block; }

            /* ডিজাইন টাইট করার জন্য */
            .receipt-copy h2 { font-size: 18px !important; line-height: 1 !important; margin-bottom: 2px !important; }
            .receipt-copy table { font-size: 10px !important; margin-bottom: 2px !important; }
            .receipt-copy th, .receipt-copy td { padding: 1px 4px !important; }
            .receipt-copy .info-row { margin-bottom: 2px !important; font-size: 11px !important; }
            .receipt-copy .signature-area { margin-top: auto !important; padding-top: 10px !important; }

            @page { size: A4; margin: 0; }
        }
        
        #print-area { display: none; }
        [contenteditable]:focus { outline: 2px solid #0d9488; background-color: #f0fdfa; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div id="main-editor" class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600 overflow-hidden no-print">
        <div id="actual-content" class="h-full flex flex-col">
            <div class="p-4 md:p-6 flex-1">
                <div class="flex justify-between items-start mb-2">
                    <div class="relative w-16 h-16 border-2 border-dashed border-teal-300 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('logoInput').click()">
                        <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                        <img id="logo-preview" class="hidden object-contain w-full h-full">
                        <span id="upload-placeholder" class="text-gray-400 text-[8px]">লোগো</span>
                    </div>
                    <div class="text-right flex-1 ml-4">
                        <h2 id="shopName" class="text-xl font-bold text-teal-700 italic uppercase" contenteditable="true">YOUR SHOP NAME</h2>
                        <div class="flex flex-wrap gap-2 justify-end text-[10px] mt-1">
                            <span id="shopAddress" class="border border-teal-500 px-2 py-0.5 text-teal-600 rounded" contenteditable="true">ঠিকানা</span>
                            <span id="shopMobile" class="border border-teal-500 px-2 py-0.5 text-teal-600 rounded" contenteditable="true">মোবাইল</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between text-xs font-bold mb-2 text-gray-700">
                    <div>রিসিট নং: <span id="receiptNo" contenteditable="true">101</span></div>
                    <div>তারিখ: <span id="currentDate"></span></div>
                </div>

                <div class="text-xs font-bold space-y-1 mb-2">
                    <div class="info-row flex items-center"><span class="w-12">Name:</span><div class="flex-1 ml-2 border-b border-dotted border-teal-400" contenteditable="true">......................</div></div>
                    <div class="info-row flex items-center"><span class="w-24">Acc Number:</span><div class="flex-1 ml-2 border-b border-dotted border-teal-400" contenteditable="true">......................</div></div>
                </div>

                <table class="w-full border-collapse border border-teal-600 text-xs mb-2">
                    <thead>
                        <tr class="bg-teal-600 text-white">
                            <th class="border border-teal-600 p-1">SL</th>
                            <th class="border border-teal-600 p-1 text-left">বিবরণ</th>
                            <th class="border border-teal-600 p-1">পরিমাণ</th>
                            <th class="border border-teal-600 p-1">দর</th>
                            <th class="border border-teal-600 p-1 text-right">মোট</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>

                <div class="signature-area flex justify-between text-[10px] font-bold text-teal-800">
                    <div class="border-t border-teal-600 pt-1 w-24 text-center">গ্রাহকের স্বাক্ষর</div>
                    <div class="border-t border-teal-600 pt-1 w-24 text-center">ক্যাশিয়ারের স্বাক্ষর</div>
                </div>
            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <div class="max-w-4xl mx-auto flex gap-4 mt-8 no-print pb-10 px-2">
        <button onclick="doPrint()" class="flex-1 bg-blue-600 text-white py-4 rounded-lg font-bold shadow-xl">প্রিন্ট করুন</button>
    </div>

    <script>
        function addNewRow() {
            const tableBody = document.getElementById('table-body');
            if (tableBody.rows.length >= 2) return; // ২.৯ ইঞ্চিতে ২ লাইনের বেশি টেবিল দিলে সাইন কেটে যাবে
            const newRow = document.createElement('tr');
            newRow.innerHTML = `<td class="border border-teal-600 p-0.5 text-center">1</td><td class="border border-teal-600 p-0.5" contenteditable="true">নগদ জমা</td><td class="border border-teal-600 p-0.5 text-center" contenteditable="true">1000</td><td class="border border-teal-600 p-0.5 text-center" contenteditable="true">1</td><td class="border border-teal-600 p-0.5 text-right font-bold">1000.00</td>`;
            tableBody.appendChild(newRow);
        }

        function doPrint() {
            const printArea = document.getElementById('print-area');
            const content = document.getElementById('actual-content').innerHTML;
            printArea.innerHTML = `
                <div class="receipt-copy">${content}</div>
                <div class="spacer"></div>
                <div class="receipt-copy">${content}</div>
            `;
            window.print();
        }

        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                document.getElementById('logo-preview').src = e.target.result; 
                document.getElementById('logo-preview').classList.remove('hidden'); 
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        window.onload = () => {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            addNewRow();
        };
    </script>
</body>
</html>
