<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট - গ্রাহক ও অফিস কপি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }

        /* প্রিন্ট সেটিংস */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            @page { size: A4; margin: 0; }
            
            #print-wrapper { display: block !important; }
            #editor-container, .max-w-4xl { display: none !important; }
        }

        /* রিসিটের নির্দিষ্ট সাইজ (৪ ইঞ্চি) */
        .receipt-copy { 
            height: 4in; 
            width: 100%; 
            padding: 15px; 
            box-sizing: border-box; 
            position: relative;
            overflow: hidden; /* লেখা ৪ ইঞ্চির বাইরে যাবে না */
            background: white;
        }

        /* কাটার চিহ্ন */
        .cut-mark {
            width: 100%;
            text-align: center;
            position: absolute;
            bottom: -10px;
            left: 0;
            border-bottom: 1px dashed #000;
            z-index: 10;
        }
        .cut-mark span { background: white; padding: 0 10px; font-size: 16px; }

        [contenteditable]:focus { outline: 2px solid #0d9488; background-color: #f0fdfa; border-radius: 4px; }
        
        /* রিসিটের কন্টেন্ট ফিট রাখার জন্য ছোট কিছু টুইক */
        .receipt-content-fit { transform: scale(0.95); transform-origin: top; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div id="editor-container" class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600 overflow-hidden">
        <div class="p-4 md:p-8" id="main-design">
            <div class="flex justify-between items-start mb-4">
                <div class="relative w-20 h-20 border-2 border-dashed border-teal-300 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('logoInput').click()">
                    <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                    <img id="logo-preview" class="hidden object-contain w-full h-full">
                    <span id="upload-placeholder" class="text-gray-400 text-[10px]">লোগো</span>
                </div>
                <div class="text-right flex-1 ml-4">
                    <h2 id="shopName" class="text-xl font-bold text-teal-700 italic uppercase" contenteditable="true">YOUR SHOP NAME</h2>
                    <div class="flex flex-wrap gap-2 justify-end text-[10px] mt-1">
                        <span id="shopAddress" class="border border-teal-500 px-2 py-0.5 text-teal-600 rounded" contenteditable="true">ঠিকানা</span>
                        <span id="shopMobile" class="border border-teal-500 px-2 py-0.5 text-teal-600 rounded" contenteditable="true">মোবাইল</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between text-xs font-bold mb-2 text-gray-700">
                <div>রিসিট নং: <span id="receiptNo" contenteditable="true">101</span></div>
                <div>তারিখ: <span id="currentDate"></span></div>
            </div>

            <div class="text-[11px] font-bold mb-2 text-gray-700 space-y-1">
                <div class="flex items-center">
                    <span class="w-12">Name:</span>
                    <div id="custName" class="flex-1 ml-2 border-b border-dotted border-teal-400 focus:outline-none px-1" contenteditable="true" onfocus="handleFocus(this)" onblur="handleBlur(this, '..................................')">..................................</div>
                </div>
                <div class="flex items-center">
                    <span class="w-24">Account Number:</span>
                    <div id="custAcc" class="flex-1 ml-2 border-b border-dotted border-teal-400 focus:outline-none px-1" contenteditable="true" onfocus="handleFocus(this)" onblur="handleBlur(this, '..................................')">..................................</div>
                </div>
            </div>

            <table class="w-full border-collapse border border-teal-600 text-[11px] mb-2">
                <thead>
                    <tr class="bg-teal-600 text-white">
                        <th class="border border-teal-600 p-0.5 w-8">SL</th>
                        <th class="border border-teal-600 p-0.5 text-left">বিবরণ</th>
                        <th class="border border-teal-600 p-0.5 w-16">পরিমাণ</th>
                        <th class="border border-teal-600 p-0.5 w-16">দর</th>
                        <th class="border border-teal-600 p-0.5 w-24 text-right">মোট টাকা</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
                <tfoot>
                    <tr class="text-teal-700 font-bold bg-teal-50">
                        <td colspan="4" class="border border-teal-600 p-0.5 text-right">মোট জমাকৃত টাকা:</td>
                        <td id="grandTotal" class="border border-teal-600 p-0.5 text-right">0.00</td>
                    </tr>
                </tfoot>
            </table>

            <p class="text-[10px] italic text-teal-800 font-semibold">কথায়: <span id="amountInWords">শূণ্য টাকা মাত্র।</span></p>

            <div class="flex justify-between mt-6 text-[10px] font-bold text-teal-800">
                <div class="border-t border-teal-600 pt-1 w-24 text-center">গ্রাহকের স্বাক্ষর</div>
                <div class="border-t border-teal-600 pt-1 w-24 text-center">ক্যাশিয়ারের স্বাক্ষর</div>
            </div>
        </div>
    </div>

    <div id="print-wrapper" class="hidden"></div>

    <div class="max-w-4xl mx-auto flex gap-4 mt-8 no-print pb-10 px-2">
        <button onclick="generateTwoCopiesAndPrint()" class="flex-1 bg-blue-600 text-white py-4 rounded-lg font-bold shadow-xl">প্রিন্ট করুন</button>
        <button onclick="clearAllData()" class="bg-red-500 text-white py-4 px-6 rounded-lg font-bold">রিসেট</button>
    </div>

    <script>
        const noteSequence = [1000, 500, 200, 100, 50, 20, 10, 5];

        function handleFocus(el) { if (el.innerText.trim().includes('...')) el.innerText = ''; }
        function handleBlur(el, placeholder) { if (el.innerText.trim() === '') el.innerText = placeholder; }

        function addNewRow(shouldFocus = false) {
            const tableBody = document.getElementById('table-body');
            const rowCount = tableBody.rows.length;
            if (rowCount >= 8) return; // ৪ ইঞ্চিতে ফিট রাখার জন্য লিমিট ৮ রাখা ভালো
            
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="border border-teal-600 p-0.5 text-center">${rowCount + 1}</td>
                <td class="border border-teal-600 p-0.5" contenteditable="true">নোট</td>
                <td class="border border-teal-600 p-0.5 text-center qty" contenteditable="true" oninput="calculate(this)">${noteSequence[rowCount] || 0}</td>
                <td class="border border-teal-600 p-0.5 text-center rate" contenteditable="true" oninput="calculate(this)" onkeydown="checkTab(event, this)">0</td>
                <td class="border border-teal-600 p-0.5 text-right row-total">0.00</td>
            `;
            tableBody.appendChild(newRow);
            if(shouldFocus) {
                const rateField = newRow.querySelector('.rate');
                rateField.focus();
                document.execCommand('selectAll', false, null);
            }
        }

        function checkTab(e, el) {
            if (e.key === "Tab" || e.key === "Enter") {
                const tableBody = document.getElementById('table-body');
                if (el.closest('tr') === tableBody.lastElementChild) {
                    e.preventDefault();
                    addNewRow(true);
                }
            }
        }

        function calculate(el) {
            const row = el.closest('tr');
            let qty = parseFloat(row.querySelector('.qty').innerText) || 0;
            let rate = parseFloat(row.querySelector('.rate').innerText) || 0;
            row.querySelector('.row-total').innerText = (qty * rate).toFixed(2);
            updateGrandTotal();
        }

        function updateGrandTotal() {
            let total = 0;
            document.querySelectorAll('.row-total').forEach(c => total += parseFloat(c.innerText) || 0);
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('amountInWords').innerText = bngAmountInWords(total);
        }

        function bngAmountInWords(num) {
            const units = ['', 'এক', 'দুই', 'তিন', 'চার', 'পাঁচ', 'ছয়', 'সাত', 'আট', 'নয়'];
            const tens = ['', '', 'বিশ', 'ত্রিশ', 'চল্লিশ', 'পঞ্চাশ', 'ষাট', 'সত্তর', 'আশি', 'নব্বই'];
            const teenagers = ['দশ', 'এগারো', 'বারো', 'তেরো', 'চৌদ্দ', 'পনেরো', 'ষোলো', 'সতেরো', 'আঠারো', 'উনিশ'];
            if (num == 0) return 'শূণ্য টাকা মাত্র।';
            function convert(n) {
                let word = '';
                if (n >= 10000000) { word += convert(Math.floor(n / 10000000)) + ' কোটি '; n %= 10000000; }
                if (n >= 100000) { word += convert(Math.floor(n / 100000)) + ' লাখ '; n %= 100000; }
                if (n >= 1000) { word += convert(Math.floor(n / 1000)) + ' হাজার '; n %= 1000; }
                if (n >= 100) { word += convert(Math.floor(n / 100)) + 'শ '; n %= 100; }
                if (n >= 20) { word += tens[Math.floor(n / 10)]; if (n % 10 > 0) word += ' ' + units[n % 10]; }
                else if (n >= 10) { word += teenagers[n - 10]; }
                else if (n > 0) { word += units[n]; }
                return word;
            }
            return convert(Math.floor(num)).trim() + ' টাকা মাত্র।';
        }

        function generateTwoCopiesAndPrint() {
            const printWrapper = document.getElementById('print-wrapper');
            const mainContent = document.getElementById('main-design').innerHTML;
            
            printWrapper.innerHTML = `
                <div class="receipt-copy">
                    <div style="text-align:right; font-size:10px; font-weight:bold; color:teal;">Customer Copy</div>
                    <div class="receipt-content-fit">${mainContent}</div>
                    <div class="cut-mark"><span>✂--------------------------------</span></div>
                </div>
                
                <div class="receipt-copy">
                    <div style="text-align:right; font-size:10px; font-weight:bold; color:teal; margin-top:10px;">Office Copy</div>
                    <div class="receipt-content-fit">${mainContent}</div>
                </div>
            `;
            
            window.print();
            incrementReceiptNo();
        }

        function incrementReceiptNo() {
            let receiptEl = document.getElementById('receiptNo');
            let currentNo = parseInt(receiptEl.innerText.replace(/\D/g, '')) || 0;
            receiptEl.innerText = currentNo + 1;
        }

        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('logo-preview').src = e.target.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function loadSavedData() {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            if(document.getElementById('table-body').rows.length === 0) addNewRow(false);
        }

        function clearAllData() {
            if(confirm("সব ডাটা ক্লিয়ার করবেন?")) location.reload();
        }
    </script>
</body>
</html>
