<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট - লিমিটেড নোট এন্ট্রি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        @media print { .no-print { display: none !important; } .receipt-container { border: none; box-shadow: none; width: 100%; margin: 0; } }
        [contenteditable]:focus { outline: 2px solid #0d9488; background-color: #f0fdfa; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600 receipt-container overflow-hidden">
        <div class="p-4 md:p-8">
            <div class="flex justify-between items-start mb-8">
                <div class="relative w-24 h-24 md:w-28 md:h-28 border-2 border-dashed border-teal-300 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('logoInput').click()">
                    <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                    <img id="logo-preview" class="hidden">
                    <span id="upload-placeholder" class="text-gray-400 text-[10px]">লোগো</span>
                </div>
                <div class="text-right flex-1 ml-4">
                    <h2 id="shopName" class="text-2xl md:text-3xl font-bold text-gray-400 italic mb-2 uppercase" contenteditable="true" oninput="saveData('shopName', this.innerText)">YOUR SHOP NAME</h2>
                    <div class="flex flex-wrap gap-2 justify-end text-xs">
                        <span id="shopAddress" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true" oninput="saveData('shopAddress', this.innerText)">ঠিকানা</span>
                        <span id="shopMobile" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true" oninput="saveData('shopMobile', this.innerText)">মোবাইল</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between text-sm font-bold mb-6 text-gray-700">
                <div>রিসিট নং: <span contenteditable="true">#101</span></div>
                <div>তারিখ: <span id="currentDate"></span></div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-teal-600 text-sm mb-4">
                    <thead>
                        <tr class="bg-teal-600 text-white">
                            <th class="border border-teal-600 p-2 w-12 text-center">SL</th>
                            <th class="border border-teal-600 p-2 text-left">বিবরণ</th>
                            <th class="border border-teal-600 p-2 w-20 md:w-24 text-center">পরিমাণ</th>
                            <th class="border border-teal-600 p-2 w-20 md:w-24 text-center">দর</th>
                            <th class="border border-teal-600 p-2 w-28 md:w-32 text-right">মোট টাকা</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr class="item-row">
                            <td class="border border-teal-600 p-2 text-center sl-no" contenteditable="true">১</td>
                            <td class="border border-teal-600 p-2" contenteditable="true"></td>
                            <td class="border border-teal-600 p-2 text-center qty font-bold text-teal-800" contenteditable="true" oninput="calculate(this)">1000</td>
                            <td class="border border-teal-600 p-2 text-center rate" contenteditable="true" oninput="calculate(this)" onkeydown="handleKeyNavigation(event, this)">0</td>
                            <td class="border border-teal-600 p-2 text-right font-bold row-total">0.00</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="text-teal-700 font-bold bg-teal-50">
                            <td colspan="4" class="border border-teal-600 p-2 text-right uppercase font-black">GRAND TOTAL:</td>
                            <td id="grandTotal" class="border border-teal-600 p-2 text-right font-black">0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <p class="mt-4 text-xs italic text-teal-800 font-semibold border-b border-dotted border-teal-300 inline-block">কথায়: <span id="amountInWords">শূণ্য টাকা মাত্র।</span></p>

            <div class="flex justify-between mt-16 md:mt-24 text-xs font-bold text-teal-800">
                <div class="border-t border-teal-600 pt-2 w-32 md:w-44 text-center uppercase text-[10px] md:text-xs">গ্রাহকের স্বাক্ষর</div>
                <div class="border-t border-teal-600 pt-2 w-32 md:w-44 text-center uppercase text-[10px] md:text-xs">কর্তৃপক্ষের স্বাক্ষর</div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto flex gap-2 md:gap-4 mt-8 no-print pb-10">
        <button onclick="window.print()" class="flex-1 bg-blue-600 text-white py-3 rounded font-bold shadow-lg">Print / Save PDF</button>
        <button onclick="clearAllData()" class="bg-red-500 text-white py-3 px-4 md:px-6 rounded font-bold">Reset</button>
    </div>

    <script>
        // নোটের তালিকা ৫ পর্যন্ত সীমাবদ্ধ
        const noteSequence = [1000, 500, 200, 100, 50, 20, 10, 5];

        function handleKeyNavigation(event, el) {
            if (event.key === "Enter" || event.key === "Tab") {
                const row = el.closest('tr');
                const rowCount = document.getElementById('table-body').rows.length;

                // যদি এটি শেষ রো হয় এবং নোটের তালিকা শেষ না হয়
                if (row === row.parentNode.lastElementChild) {
                    if (rowCount < noteSequence.length) {
                        event.preventDefault();
                        addNewRow();
                    } else {
                        // ৫ টাকার রো হয়ে গেলে এন্টার চাপলে আর নতুন রো হবে না, শুধু ফোকাস ছেড়ে দেবে
                        if (event.key === "Enter") el.blur();
                    }
                }
            }
        }

        function addNewRow() {
            const tableBody = document.getElementById('table-body');
            const rowCount = tableBody.rows.length;
            
            // পরবর্তী নোট লিস্ট থেকে নেবে
            let nextNote = noteSequence[rowCount];

            const newRow = document.createElement('tr');
            newRow.className = "item-row";
            newRow.innerHTML = `
                <td class="border border-teal-600 p-2 text-center sl-no" contenteditable="true">${rowCount + 1}</td>
                <td class="border border-teal-600 p-2" contenteditable="true"></td>
                <td class="border border-teal-600 p-2 text-center qty font-bold text-teal-800" contenteditable="true" oninput="calculate(this)">${nextNote}</td>
                <td class="border border-teal-600 p-2 text-center rate" contenteditable="true" oninput="calculate(this)" onkeydown="handleKeyNavigation(event, this)">0</td>
                <td class="border border-teal-600 p-2 text-right font-bold row-total">0.00</td>
            `;
            tableBody.appendChild(newRow);
            
            newRow.querySelector('.rate').focus();
            document.execCommand('selectAll', false, null);
        }

        function calculate(el) {
            const row = el.closest('tr');
            let qty = parseFloat(row.querySelector('.qty').innerText.replace(/[^\d.]/g, '')) || 0;
            let rate = parseFloat(row.querySelector('.rate').innerText.replace(/[^\d.]/g, '')) || 0;
            row.querySelector('.row-total').innerText = (qty * rate).toFixed(2);
            updateGrandTotal();
        }

        function updateGrandTotal() {
            let total = 0;
            document.querySelectorAll('.row-total').forEach(c => total += parseFloat(c.innerText) || 0);
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('amountInWords').innerText = bngAmountInWords(total);
        }

        function bngAmountInWords(num) {
            const units = ['', 'এক', 'দুই', 'তিন', 'চার', 'পাঁচ', 'ছয়', 'সাত', 'আট', 'নয়'];
            const tens = ['', '', 'বিশ', 'ত্রিশ', 'চল্লিশ', 'পঞ্চাশ', 'ষাট', 'সত্তর', 'আশি', 'নব্বই'];
            const teenagers = ['দশ', 'এগারো', 'বারো', 'তেরো', 'চৌদ্দ', 'পনেরো', 'ষোলো', 'সতেরো', 'আঠারো', 'উনিশ'];
            if (num == 0) return 'শূণ্য';
            function convert(n) {
                let word = '';
                if (n >= 10000000) { word += convert(Math.floor(n / 10000000)) + ' কোটি '; n %= 10000000; }
                if (n >= 100000) { word += convert(Math.floor(n / 100000)) + ' লাখ '; n %= 100000; }
                if (n >= 1000) { word += convert(Math.floor(n / 1000)) + ' হাজার '; n %= 1000; }
                if (n >= 100) { word += convert(Math.floor(n / 100)) + 'শ '; n %= 100; }
                if (n >= 20) { word += tens[Math.floor(n / 10)]; if (n % 10 > 0) word += ' ' + units[n % 10]; }
                else if (n >= 10) { word += teenagers[n - 10]; }
                else if (n > 0) { word += units[n]; }
                return word;
            }
            return convert(Math.floor(num)).trim() + ' টাকা মাত্র।';
        }

        function saveData(k, v) { localStorage.setItem(k, v); }
        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('logo-preview').src = e.target.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                localStorage.setItem('savedLogo', e.target.result);
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function loadSavedData() {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            ['shopName', 'shopAddress', 'shopMobile'].forEach(k => {
                let v = localStorage.getItem(k); if(v) document.getElementById(k).innerText = v;
            });
            let logo = localStorage.getItem('savedLogo');
            if(logo) {
                document.getElementById('logo-preview').src = logo;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            }
        }
        function clearAllData() { if(confirm("সব ডাটা রিসেট করবেন?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
