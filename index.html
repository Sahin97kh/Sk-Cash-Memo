<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট - সুপার স্লিম ফিক্স</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            #editor-container { display: none; }
            #print-wrapper { display: block !important; width: 100%; }
            
            .receipt-copy { 
                width: 100%;
                /* হাইট অনেক কমিয়ে আনা হয়েছে */
                height: 28vh; 
                padding: 10px 30px;
                box-sizing: border-box;
                overflow: hidden;
            }
            
            .print-scale { 
                width: 100% !important;
                border: 1px solid #0d9488;
                padding: 8px; /* প্যাডিং কমানো হয়েছে */
                background: white;
                /* টেক্সট এবং পুরো ডিজাইন ছোট করার জন্য স্কেলিং */
                transform: scale(0.85);
                transform-origin: top center;
            }

            .cut-line {
                width: 100%;
                border-top: 1px dashed #666;
                position: relative;
                margin: 2px 0;
            }
            .cut-line::after {
                content: '✂';
                position: absolute;
                top: -12px;
                left: 5%;
                font-size: 14px;
                background: white;
                padding: 0 5px;
            }

            /* টেবিল এবং ফন্ট আরও ছোট করা */
            table { font-size: 10px !important; }
            h2 { font-size: 18px !important; }
            .text-sm { font-size: 10px !important; }

            @page { size: A4; margin: 0; }
        }
        [contenteditable]:focus { outline: 2px solid #0d9488; background-color: #f0fdfa; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div id="editor-container" class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600">
        <div class="p-4 md:p-8">
            <div class="flex justify-between items-start mb-4">
                <div class="relative w-20 h-20 border-2 border-dashed border-teal-300 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('logoInput').click()">
                    <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                    <img id="logo-preview" class="hidden object-contain w-full h-full">
                    <span id="upload-placeholder" class="text-gray-400 text-[10px]">লোগো</span>
                </div>
                <div class="text-right flex-1 ml-4">
                    <h2 id="shopName" class="text-2xl font-bold text-teal-700 italic uppercase" contenteditable="true" oninput="saveData('shopName', this.innerText)">YOUR SHOP NAME</h2>
                    <div class="flex flex-wrap gap-2 justify-end text-xs mt-2">
                        <span id="shopAddress" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true" oninput="saveData('shopAddress', this.innerText)">ঠিকানা</span>
                        <span id="shopMobile" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true" oninput="saveData('shopMobile', this.innerText)">মোবাইল</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between text-sm font-bold mb-3 text-gray-700">
                <div>রিসিট নং: <span id="receiptNo" contenteditable="true" oninput="saveData('receiptNo', this.innerText)">101</span></div>
                <div>তারিখ: <span id="currentDate"></span></div>
            </div>

            <div class="text-sm font-bold mb-3 text-gray-700 space-y-2">
                <div class="flex items-center">
                    <span class="w-16">Name:</span>
                    <div id="custName" class="flex-1 ml-2 border-b border-dotted border-teal-400 focus:outline-none px-1" contenteditable="true">...................................................</div>
                </div>
                <div class="flex items-center">
                    <span class="w-28">Acc Number:</span>
                    <div id="custAcc" class="flex-1 ml-2 border-b border-dotted border-teal-400 focus:outline-none px-1" contenteditable="true">..........................................</div>
                </div>
            </div>

            <table class="w-full border-collapse border border-teal-600 text-sm mb-2">
                <thead>
                    <tr class="bg-teal-600 text-white">
                        <th class="border border-teal-600 p-1 w-10">SL</th>
                        <th class="border border-teal-600 p-1 text-left">বিবরণ</th>
                        <th class="border border-teal-600 p-1 w-20">পরিমাণ</th>
                        <th class="border border-teal-600 p-1 w-20">দর</th>
                        <th class="border border-teal-600 p-1 w-24 text-right">টাকা</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
                <tfoot>
                    <tr class="text-teal-700 font-bold bg-teal-50">
                        <td colspan="4" class="border border-teal-600 p-1 text-right">মোট জমাকৃত টাকা:</td>
                        <td id="grandTotal" class="border border-teal-600 p-1 text-right">0.00</td>
                    </tr>
                </tfoot>
            </table>

            <p class="text-[10px] italic text-teal-800 font-semibold mb-6">কথায়: <span id="amountInWords">শূণ্য টাকা মাত্র।</span></p>

            <div class="flex justify-between text-[10px] font-bold text-teal-800">
                <div class="border-t border-teal-600 pt-1 w-28 text-center">গ্রাহকের স্বাক্ষর</div>
                <div class="border-t border-teal-600 pt-1 w-28 text-center">ক্যাশিয়ারের স্বাক্ষর</div>
            </div>
        </div>
    </div>

    <div id="print-wrapper" class="hidden"></div>

    <div class="max-w-4xl mx-auto flex gap-4 mt-6 no-print pb-10 px-2">
        <button onclick="generateTwoCopiesAndPrint()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold">প্রিন্ট করুন</button>
        <button onclick="clearAllData()" class="bg-red-500 text-white py-3 px-6 rounded-lg font-bold">রিসেট</button>
    </div>

    <script>
        const noteSequence = [1000, 500, 200, 100, 50, 20, 10, 5];

        function addNewRow(shouldFocus = false) {
            const tableBody = document.getElementById('table-body');
            const rowCount = tableBody.rows.length;
            if (rowCount >= 8) return; /* রো সংখ্যা কমানো হয়েছে উচ্চতা ঠিক রাখতে */
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="border border-teal-600 p-1 text-center">${rowCount + 1}</td>
                <td class="border border-teal-600 p-1" contenteditable="true"></td>
                <td class="border border-teal-600 p-1 text-center qty" contenteditable="true" oninput="calculate(this)">${noteSequence[rowCount] || ''}</td>
                <td class="border border-teal-600 p-1 text-center rate" contenteditable="true" oninput="calculate(this)" onkeydown="checkTab(event, this)">0</td>
                <td class="border border-teal-600 p-1 text-right row-total">0.00</td>
            `;
            tableBody.appendChild(newRow);
            if(shouldFocus) newRow.querySelector('.rate').focus();
        }

        function checkTab(e, el) {
            if (e.key === "Tab" || e.key === "Enter") {
                const tableBody = document.getElementById('table-body');
                if (el.closest('tr') === tableBody.lastElementChild) {
                    e.preventDefault();
                    addNewRow(true);
                }
            }
        }

        function calculate(el) {
            const row = el.closest('tr');
            let qty = parseFloat(row.querySelector('.qty').innerText) || 0;
            let rate = parseFloat(row.querySelector('.rate').innerText) || 0;
            row.querySelector('.row-total').innerText = (qty * rate).toFixed(2);
            updateGrandTotal();
        }

        function updateGrandTotal() {
            let total = 0;
            document.querySelectorAll('.row-total').forEach(c => total += parseFloat(c.innerText) || 0);
            document.getElementById('grandTotal').innerText = total.toFixed(2);
        }

        function generateTwoCopiesAndPrint() {
            const printWrapper = document.getElementById('print-wrapper');
            const editorContent = document.getElementById('editor-container').innerHTML;
            
            printWrapper.innerHTML = `
                <div class="receipt-copy">
                    <div style="font-size: 8px; text-align: right; font-weight: bold; margin-bottom: 2px;">Customer Copy</div>
                    <div class="print-scale">${editorContent}</div>
                </div>
                <div class="cut-line"></div>
                <div class="receipt-copy">
                    <div style="font-size: 8px; text-align: right; font-weight: bold; margin-bottom: 2px;">Office Copy</div>
                    <div class="print-scale">${editorContent}</div>
                </div>
            `;
            
            window.print();
            incrementReceiptNo();
        }

        function incrementReceiptNo() {
            let receiptEl = document.getElementById('receiptNo');
            let nextNo = (parseInt(receiptEl.innerText) || 0) + 1;
            receiptEl.innerText = nextNo;
            saveData('receiptNo', nextNo);
        }

        function saveData(k, v) { localStorage.setItem(k, v); }

        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('logo-preview').src = e.target.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                localStorage.setItem('savedLogo', e.target.result);
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function loadSavedData() {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            ['shopName', 'shopAddress', 'shopMobile', 'receiptNo'].forEach(k => {
                let v = localStorage.getItem(k);
                if (v && document.getElementById(k)) document.getElementById(k).innerText = v;
            });
            let logo = localStorage.getItem('savedLogo');
            if(logo) {
                document.getElementById('logo-preview').src = logo;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            }
            if(document.getElementById('table-body').rows.length === 0) addNewRow(false);
        }

        function clearAllData() {
            if(confirm("সব ক্লিয়ার করবেন?")) {
                document.getElementById('table-body').innerHTML = '';
                addNewRow(false);
                updateGrandTotal();
            }
        }
    </script>
</body>
</html>
