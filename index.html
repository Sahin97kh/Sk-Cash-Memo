<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }

        /* প্রিন্ট সেটিংস: কাগজের জন্য */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .receipt-container { 
                box-shadow: none !important; 
                border: 1px solid #0d9488 !important; 
                margin: 0 auto 20px auto !important;
                width: 100% !important;
            }
            #print-wrapper { display: block !important; }
            .copy-tag { display: block !important; text-align: center; font-size: 11px; color: #555; margin-bottom: 8px; font-weight: bold; }
            @page { size: A4; margin: 0.8cm; }
        }

        /* স্ক্রিন সেটিংস: মোবাইলে বা কম্পিউটারে দেখার জন্য */
        #print-wrapper { display: none; }
        .copy-tag { display: none; }
        [contenteditable]:focus { outline: 2px solid #0d9488; background-color: #f0fdfa; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div id="editor-container" class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600 receipt-container overflow-hidden">
        <div class="p-4 md:p-8">
            <div class="flex justify-between items-start mb-6">
                <div class="relative w-24 h-24 border-2 border-dashed border-teal-300 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('logoInput').click()">
                    <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                    <img id="logo-preview" class="hidden object-contain w-full h-full">
                    <span id="upload-placeholder" class="text-gray-400 text-[10px]">লোগো</span>
                </div>
                <div class="text-right flex-1 ml-4">
                    <h2 id="shopName" class="text-2xl font-bold text-teal-700 italic mb-1 uppercase" contenteditable="true" oninput="saveData('shopName', this.innerText)">YOUR SHOP NAME</h2>
                    <div class="flex flex-wrap gap-2 justify-end text-xs">
                        <span id="shopAddress" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true" oninput="saveData('shopAddress', this.innerText)">ঠিকানা</span>
                        <span id="shopMobile" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true" oninput="saveData('shopMobile', this.innerText)">মোবাইল</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between text-sm font-bold mb-4 text-gray-700">
                <div>রিসিট নং: <span id="receiptNo" contenteditable="true">#101</span></div>
                <div>তারিখ: <span id="currentDate"></span></div>
            </div>

            <table class="w-full border-collapse border border-teal-600 text-sm mb-4">
                <thead>
                    <tr class="bg-teal-600 text-white">
                        <th class="border border-teal-600 p-2 w-12">SL</th>
                        <th class="border border-teal-600 p-2 text-left">বিবরণ</th>
                        <th class="border border-teal-600 p-2 w-24">পরিমাণ</th>
                        <th class="border border-teal-600 p-2 w-24">দর</th>
                        <th class="border border-teal-600 p-2 w-32 text-right">মোট টাকা</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
                <tfoot>
                    <tr class="text-teal-700 font-bold bg-teal-50">
                        <td colspan="4" class="border border-teal-600 p-2 text-right">GRAND TOTAL:</td>
                        <td id="grandTotal" class="border border-teal-600 p-2 text-right">0.00</td>
                    </tr>
                </tfoot>
            </table>

            <p class="text-xs italic text-teal-800 font-semibold border-b border-dotted border-teal-300 inline-block">কথায়: <span id="amountInWords">শূণ্য টাকা মাত্র।</span></p>

            <div class="flex justify-between mt-12 text-xs font-bold text-teal-800">
                <div class="border-t border-teal-600 pt-1 w-32 text-center">গ্রাহকের স্বাক্ষর</div>
                <div class="border-t border-teal-600 pt-1 w-32 text-center">কর্তৃপক্ষের স্বাক্ষর</div>
            </div>
        </div>
    </div>

    <div id="print-wrapper" class="max-w-4xl mx-auto"></div>

    <div class="max-w-4xl mx-auto flex gap-4 mt-8 no-print pb-10 px-2">
        <button onclick="generateTwoCopiesAndPrint()" class="flex-1 bg-blue-600 text-white py-4 rounded-lg font-bold shadow-xl hover:bg-blue-700 transition-all">প্রিন্ট করুন</button>
        <button onclick="clearAllData()" class="bg-red-500 text-white py-4 px-6 rounded-lg font-bold hover:bg-red-600 transition-all">রিসেট</button>
    </div>

    <script>
        const noteSequence = [1000, 500, 200, 100, 50, 20, 10, 5];

        function handleKeyNavigation(event, el) {
            if (event.key === "Enter" || event.key === "Tab") {
                const row = el.closest('tr');
                const rowCount = document.getElementById('table-body').rows.length;
                if (row === row.parentNode.lastElementChild && rowCount < noteSequence.length) {
                    event.preventDefault();
                    addNewRow();
                }
            }
        }

        function addNewRow() {
            const tableBody = document.getElementById('table-body');
            const rowCount = tableBody.rows.length;
            let nextNote = noteSequence[rowCount];

            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="border border-teal-600 p-2 text-center">${rowCount + 1}</td>
                <td class="border border-teal-600 p-2" contenteditable="true"></td>
                <td class="border border-teal-600 p-2 text-center font-bold text-teal-800 qty" contenteditable="true" oninput="calculate(this)">${nextNote}</td>
                <td class="border border-teal-600 p-2 text-center rate" contenteditable="true" oninput="calculate(this)" onkeydown="handleKeyNavigation(event, this)">0</td>
                <td class="border border-teal-600 p-2 text-right font-bold row-total">0.00</td>
            `;
            tableBody.appendChild(newRow);
            newRow.querySelector('.rate').focus();
            document.execCommand('selectAll', false, null);
        }

        function calculate(el) {
            const row = el.closest('tr');
            let qty = parseFloat(row.querySelector('.qty').innerText) || 0;
            let rate = parseFloat(row.querySelector('.rate').innerText) || 0;
            row.querySelector('.row-total').innerText = (qty * rate).toFixed(2);
            updateGrandTotal();
        }

        function updateGrandTotal() {
            let total = 0;
            document.querySelectorAll('#table-body .row-total').forEach(c => total += parseFloat(c.innerText) || 0);
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('amountInWords').innerText = bngAmountInWords(total);
        }

        function bngAmountInWords(num) {
            const units = ['', 'এক', 'দুই', 'তিন', 'চার', 'পাঁচ', 'ছয়', 'সাত', 'আট', 'নয়'];
            const tens = ['', '', 'বিশ', 'ত্রিশ', 'চল্লিশ', 'পঞ্চাশ', 'ষাট', 'সত্তর', 'আশি', 'নব্বই'];
            const teenagers = ['দশ', 'এগারো', 'বারো', 'তেরো', 'চৌদ্দ', 'পনেরো', 'ষোলো', 'সতেরো', 'আঠারো', 'উনিশ'];
            if (num == 0) return 'শূণ্য';
            function convert(n) {
                let word = '';
                if (n >= 10000000) { word += convert(Math.floor(n / 10000000)) + ' কোটি '; n %= 10000000; }
                if (n >= 100000) { word += convert(Math.floor(n / 100000)) + ' লাখ '; n %= 100000; }
                if (n >= 1000) { word += convert(Math.floor(n / 1000)) + ' হাজার '; n %= 1000; }
                if (n >= 100) { word += convert(Math.floor(n / 100)) + 'শ '; n %= 100; }
                if (n >= 20) { word += tens[Math.floor(n / 10)]; if (n % 10 > 0) word += ' ' + units[n % 10]; }
                else if (n >= 10) { word += teenagers[n - 10]; }
                else if (n > 0) { word += units[n]; }
                return word;
            }
            return convert(Math.floor(num)).trim() + ' টাকা মাত্র।';
        }

        // বাটন ক্লিক করলে এই ফাংশন ২ কপি তৈরি করে প্রিন্ট দিবে
        function generateTwoCopiesAndPrint() {
            const printWrapper = document.getElementById('print-wrapper');
            const editorContainer = document.getElementById('editor-container');
            const content = editorContainer.innerHTML;
            
            printWrapper.innerHTML = `
                <div class="receipt-copy">
                    <div class="copy-tag">— গ্রাহক কপি —</div>
                    ${content}
                </div>
                <div style="height: 50px; border-bottom: 1px dashed #999; margin-bottom: 50px;"></div>
                <div class="receipt-copy">
                    <div class="copy-tag">— অফিস কপি —</div>
                    ${content}
                </div>
            `;

            editorContainer.style.display = 'none';
            printWrapper.style.display = 'block';

            window.print();

            editorContainer.style.display = 'block';
            printWrapper.style.display = 'none';
        }

        function saveData(k, v) { localStorage.setItem(k, v); }
        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('logo-preview').src = e.target.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                localStorage.setItem('savedLogo', e.target.result);
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function loadSavedData() {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            ['shopName', 'shopAddress', 'shopMobile'].forEach(k => {
                let v = localStorage.getItem(k); if(v) document.getElementById(k).innerText = v;
            });
            let logo = localStorage.getItem('savedLogo');
            if(logo) {
                document.getElementById('logo-preview').src = logo;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            }
            addNewRow();
        }
        function clearAllData() { if(confirm("সব ডাটা রিসেট করবেন?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
