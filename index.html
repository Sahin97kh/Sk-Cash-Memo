<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট - ২ কপি পারফেক্ট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        
        #print-wrapper { display: none; }

        @media print {
            .no-print { display: none !important; }
            #editor-container { display: none !important; }
            #print-wrapper { display: block !important; background: white; width: 100%; }
            
            body { margin: 0; padding: 0; }

            .receipt-copy { 
                height: 2.9in !important; 
                width: 100% !important;
                max-height: 2.9in !important;
                min-height: 2.9in !important;
                padding: 10px; /* একটু মার্জিন যাতে লেখা না কাটে */
                border-bottom: 1px dashed #000;
                page-break-inside: avoid;
                overflow: hidden;
                box-sizing: border-box;
            }

            /* টেবিল এবং ফন্ট সাইজ অ্যাডজাস্টমেন্ট */
            .receipt-copy table { font-size: 10px !important; }
            .receipt-copy h2 { font-size: 16px !important; margin: 0 !important; }
            .receipt-copy .text-xs { font-size: 9px !important; }
            .receipt-copy .text-sm { font-size: 10px !important; }

            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div id="editor-container" class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600 overflow-hidden p-8">
        <div class="flex justify-between items-start mb-4">
            <div class="relative w-20 h-20 border-2 border-dashed border-teal-300 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('logoInput').click()">
                <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                <img id="logo-preview" class="hidden object-contain w-full h-full">
                <span id="upload-placeholder" class="text-gray-400 text-[10px]">লোগো</span>
            </div>
            <div class="text-right flex-1 ml-4">
                <h2 id="shopName" class="text-2xl font-bold text-teal-700 italic uppercase" contenteditable="true" oninput="saveData('shopName', this.innerText)">YOUR SHOP NAME</h2>
                <div class="flex flex-wrap gap-2 justify-end text-xs mt-2">
                    <span id="shopAddress" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true">ঠিকানা</span>
                    <span id="shopMobile" class="border border-teal-500 px-3 py-1 text-teal-600 rounded" contenteditable="true">মোবাইল</span>
                </div>
            </div>
        </div>

        <div class="flex justify-between text-sm font-bold mb-4 text-gray-700">
            <div>রিসিট নং: <span id="receiptNo" contenteditable="true">101</span></div>
            <div>তারিখ: <span id="currentDate"></span></div>
        </div>

        <div class="text-sm font-bold mb-4 text-gray-700 space-y-2">
            <div class="flex items-center"><span class="w-16">Name:</span><div id="custName" class="flex-1 border-b border-dotted border-teal-400 px-1" contenteditable="true">......................</div></div>
            <div class="flex items-center"><span class="w-32">Acc Number:</span><div id="custAcc" class="flex-1 border-b border-dotted border-teal-400 px-1" contenteditable="true">......................</div></div>
        </div>

        <table class="w-full border-collapse border border-teal-600 text-sm mb-3">
            <thead>
                <tr class="bg-teal-600 text-white">
                    <th class="border border-teal-600 p-1 w-10">SL</th>
                    <th class="border border-teal-600 p-1 text-left">বিবরণ</th>
                    <th class="border border-teal-600 p-1 w-20">পরিমাণ</th>
                    <th class="border border-teal-600 p-1 w-20">দর</th>
                    <th class="border border-teal-600 p-1 w-28 text-right">মোট</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        
        <div class="flex justify-between mt-8 text-xs font-bold text-teal-800">
            <div class="border-t border-teal-600 pt-1 w-32 text-center">গ্রাহক</div>
            <div class="border-t border-teal-600 pt-1 w-32 text-center">ক্যাশিয়ার</div>
        </div>
    </div>

    <div id="print-wrapper"></div>

    <div class="max-w-4xl mx-auto flex gap-4 mt-8 no-print pb-10 px-2">
        <button onclick="generateTwoCopiesAndPrint()" class="flex-1 bg-blue-600 text-white py-4 rounded-lg font-bold shadow-xl">প্রিন্ট করুন</button>
        <button onclick="clearAllData()" class="bg-red-500 text-white py-4 px-6 rounded-lg font-bold">রিসেট</button>
    </div>

    <script>
        // রো যোগ করার লজিক (আগের মতো)
        function addNewRow() {
            const tableBody = document.getElementById('table-body');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="border border-teal-600 p-1 text-center">1</td>
                <td class="border border-teal-600 p-1" contenteditable="true">Cash Deposit</td>
                <td class="border border-teal-600 p-1 text-center qty" contenteditable="true">1000</td>
                <td class="border border-teal-600 p-1 text-center rate" contenteditable="true">1</td>
                <td class="border border-teal-600 p-1 text-right font-bold">1000.00</td>
            `;
            tableBody.appendChild(newRow);
        }

        function generateTwoCopiesAndPrint() {
            const printWrapper = document.getElementById('print-wrapper');
            const editorContent = document.getElementById('editor-container').innerHTML;
            
            // স্কেলিং ছাড়া সরাসরি কন্টেন্ট
            printWrapper.innerHTML = `
                <div class="receipt-copy">${editorContent}</div>
                <div class="receipt-copy">${editorContent}</div>
            `;
            
            window.print();
        }

        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('logo-preview').src = e.target.result; document.getElementById('logo-preview').classList.remove('hidden'); };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        window.onload = () => {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            addNewRow();
        };

        function clearAllData() { location.reload(); }
    </script>
</body>
</html>
