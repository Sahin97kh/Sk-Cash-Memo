<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট - ২ কপি পারফেক্ট ফিট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            
            #print-area { display: block !important; width: 100%; }

            .receipt-copy { 
                height: 2.9in !important; 
                max-height: 2.9in !important;
                min-height: 2.9in !important;
                width: 100% !important;
                padding: 5px 15px !important;
                border-bottom: 1px dashed #000;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: space-between; /* লেখাগুলোকে উপর-নিচে সমানভাবে ছড়াবে */
                box-sizing: border-box;
            }

            /* লেখার সাইজ ২.৯ ইঞ্চির জন্য ছোট করা হলো */
            .receipt-copy h2 { font-size: 16px !important; margin-bottom: 2px !important; }
            .receipt-copy .text-sm { font-size: 10px !important; line-height: 1.2 !important; }
            .receipt-copy table { font-size: 9px !important; margin-bottom: 5px !important; }
            .receipt-copy th, .receipt-copy td { padding: 2px !important; }
            .receipt-copy .logo-box { width: 50px !important; height: 50px !important; }
            .receipt-copy .signature-box { margin-top: 5px !important; font-size: 9px !important; }

            @page { size: A4; margin: 0; }
        }
        
        #print-area { display: none; }
        [contenteditable]:focus { outline: 2px solid #0d9488; background-color: #f0fdfa; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div id="main-editor" class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600 overflow-hidden no-print">
        <div id="actual-content" class="p-4 md:p-8">
            <div class="flex justify-between items-start mb-4">
                <div class="logo-box relative w-20 h-20 border-2 border-dashed border-teal-300 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('logoInput').click()">
                    <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                    <img id="logo-preview" class="hidden object-contain w-full h-full">
                    <span id="upload-placeholder" class="text-gray-400 text-[10px]">লোগো</span>
                </div>
                <div class="text-right flex-1 ml-4">
                    <h2 id="shopName" class="text-xl font-bold text-teal-700 italic uppercase" contenteditable="true">YOUR SHOP NAME</h2>
                    <div class="flex flex-wrap gap-1 justify-end text-[10px] mt-1">
                        <span id="shopAddress" class="border border-teal-500 px-2 py-0.5 text-teal-600 rounded" contenteditable="true">ঠিকানা</span>
                        <span id="shopMobile" class="border border-teal-500 px-2 py-0.5 text-teal-600 rounded" contenteditable="true">মোবাইল</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between text-xs font-bold mb-2 text-gray-700">
                <div>রিসিট নং: <span id="receiptNo" contenteditable="true">101</span></div>
                <div>তারিখ: <span id="currentDate"></span></div>
            </div>

            <div class="text-xs font-bold mb-2 text-gray-700 space-y-2">
                <div class="flex items-center">
                    <span class="w-12">Name:</span>
                    <div id="custName" class="flex-1 ml-2 border-b border-dotted border-teal-400" contenteditable="true">......................</div>
                </div>
                <div class="flex items-center">
                    <span class="w-24">Acc Number:</span>
                    <div id="custAcc" class="flex-1 ml-2 border-b border-dotted border-teal-400" contenteditable="true">......................</div>
                </div>
            </div>

            <table class="w-full border-collapse border border-teal-600 text-[10px] mb-2">
                <thead>
                    <tr class="bg-teal-600 text-white">
                        <th class="border border-teal-600 p-1 w-8">SL</th>
                        <th class="border border-teal-600 p-1 text-left">বিবরণ</th>
                        <th class="border border-teal-600 p-1 w-16">পরিমাণ</th>
                        <th class="border border-teal-600 p-1 w-16">দর</th>
                        <th class="border border-teal-600 p-1 w-20 text-right">মোট</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
                <tfoot>
                    <tr class="text-teal-700 font-bold bg-teal-50">
                        <td colspan="4" class="border border-teal-600 p-1 text-right">মোট টাকা:</td>
                        <td id="grandTotal" class="border border-teal-600 p-1 text-right">0.00</td>
                    </tr>
                </tfoot>
            </table>

            <div class="signature-box flex justify-between mt-6 text-[10px] font-bold text-teal-800">
                <div class="border-t border-teal-600 pt-1 w-24 text-center">গ্রাহক</div>
                <div class="border-t border-teal-600 pt-1 w-24 text-center">ক্যাশিয়ার</div>
            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <div class="max-w-4xl mx-auto flex gap-4 mt-8 no-print pb-10 px-2">
        <button onclick="doPrint()" class="flex-1 bg-blue-600 text-white py-4 rounded-lg font-bold shadow-xl">প্রিন্ট করুন</button>
        <button onclick="location.reload()" class="bg-red-500 text-white py-4 px-6 rounded-lg font-bold">রিসেট</button>
    </div>

    <script>
        function addNewRow() {
            const tableBody = document.getElementById('table-body');
            const rowCount = tableBody.rows.length;
            if (rowCount >= 3) return; // ২.৯ ইঞ্চির জন্য ৩টির বেশি লাইন জায়গা হবে না
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="border border-teal-600 p-1 text-center">${rowCount + 1}</td>
                <td class="border border-teal-600 p-1" contenteditable="true">নগদ জমা</td>
                <td class="border border-teal-600 p-1 text-center qty" contenteditable="true" oninput="calculate(this)">1000</td>
                <td class="border border-teal-600 p-1 text-center rate" contenteditable="true" oninput="calculate(this)">0</td>
                <td class="border border-teal-600 p-1 text-right font-bold row-total">0.00</td>
            `;
            tableBody.appendChild(newRow);
        }

        function calculate(el) {
            const row = el.closest('tr');
            let qty = parseFloat(row.querySelector('.qty').innerText) || 0;
            let rate = parseFloat(row.querySelector('.rate').innerText) || 0;
            row.querySelector('.row-total').innerText = (qty * rate).toFixed(2);
            let total = 0;
            document.querySelectorAll('.row-total').forEach(c => total += parseFloat(c.innerText) || 0);
            document.getElementById('grandTotal').innerText = total.toFixed(2);
        }

        function doPrint() {
            const printArea = document.getElementById('print-area');
            const content = document.getElementById('actual-content').innerHTML;
            printArea.innerHTML = `<div class="receipt-copy">${content}</div><div class="receipt-copy">${content}</div>`;
            window.print();
        }

        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.querySelectorAll('#logo-preview').forEach(img => { img.src = e.target.result; img.classList.remove('hidden'); });
                document.querySelectorAll('#upload-placeholder').forEach(sp => sp.classList.add('hidden'));
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        window.onload = () => {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            addNewRow();
        };
    </script>
</body>
</html>
