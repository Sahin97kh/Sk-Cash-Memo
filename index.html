<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমা রিসিট - ফিক্সড লেআউট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
            @page { size: A4; margin: 0; }

            #print-wrapper {
                display: flex !important;
                flex-direction: column;
                width: 210mm;
                height: 297mm;
                background: white;
            }
            .receipt-copy { 
                height: 148.5mm; 
                width: 100%;
                padding: 8mm 10mm;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                justify-content: space-between; /* এটি স্বাক্ষরকে সবসময় নিচে আটকে রাখবে */
                border-bottom: 1px dashed #000;
            }
            /* টেবিল কন্টেইনার যাতে ফ্লেক্সিবল হয় */
            .table-container { flex-grow: 1; overflow: hidden; }
            table { font-size: 12px !important; } /* টেবিল বেশি বড় হলে ফন্ট একটু ছোট হবে */
        }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-10" onload="loadSavedData()">

    <div id="editor-container" class="max-w-4xl mx-auto bg-white shadow-2xl border border-teal-600">
        <div class="p-4 md:p-8" id="main-design">
            <div class="flex justify-between items-start mb-2">
                <div class="w-20 h-20 border-2 border-dashed border-teal-300 rounded overflow-hidden" onclick="document.getElementById('logoInput').click()">
                    <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="previewLogo(this)">
                    <img id="logo-preview" class="hidden object-contain w-full h-full">
                    <span id="upload-placeholder" class="text-gray-400 text-[10px] flex items-center justify-center h-full">লোগো</span>
                </div>
                <div class="text-right">
                    <h2 id="shopName" class="text-xl font-bold text-teal-700 italic" contenteditable="true">YOUR SHOP NAME</h2>
                    <div class="text-[10px] mt-1 space-x-1">
                        <span id="shopAddress" class="border border-teal-500 px-2 py-0.5 rounded" contenteditable="true">ঠিকানা</span>
                        <span id="shopMobile" class="border border-teal-500 px-2 py-0.5 rounded" contenteditable="true">মোবাইল</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between text-xs font-bold mb-2">
                <div>রিসিট নং: <span id="receiptNo" contenteditable="true">101</span></div>
                <div>তারিখ: <span id="currentDate"></span></div>
            </div>

            <div class="text-xs space-y-2 mb-2">
                <div class="flex border-b border-dotted border-teal-400">
                    <span class="font-bold">Name:</span>
                    <div id="custName" class="flex-1 ml-2 focus:outline-none" contenteditable="true" onfocus="if(this.innerText.includes('...')) this.innerText = '';" onblur="if(this.innerText.trim() === '') this.innerText = '..........................................';">..........................................</div>
                </div>
                <div class="flex border-b border-dotted border-teal-400">
                    <span class="font-bold">Account:</span>
                    <div id="custAcc" class="flex-1 ml-2 focus:outline-none" contenteditable="true" onfocus="if(this.innerText.includes('...')) this.innerText = '';" onblur="if(this.innerText.trim() === '') this.innerText = '..........................................';">..........................................</div>
                </div>
            </div>

            <div class="table-container">
                <table class="w-full border-collapse border border-teal-600 text-xs">
                    <thead>
                        <tr class="bg-teal-600 text-white">
                            <th class="border border-teal-600 p-1 w-8">SL</th>
                            <th class="border border-teal-600 p-1 text-left">বিবরণ</th>
                            <th class="border border-teal-600 p-1 w-16 text-center">পরিমাণ</th>
                            <th class="border border-teal-600 p-1 w-16 text-center">দর</th>
                            <th class="border border-teal-600 p-1 w-20 text-right">মোট</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                    <tfoot>
                        <tr class="bg-teal-50 font-bold">
                            <td colspan="4" class="border border-teal-600 p-1 text-right">মোট জমাকৃত টাকা:</td>
                            <td id="grandTotal" class="border border-teal-600 p-1 text-right">0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="mt-2">
                <p class="text-[10px] italic font-semibold text-teal-800">কথায়: <span id="amountInWords">শূণ্য টাকা মাত্র।</span></p>
                <div class="flex justify-between mt-6 text-[10px] font-bold">
                    <div class="border-t border-black pt-1 w-24 text-center">গ্রাহকের স্বাক্ষর</div>
                    <div class="border-t border-black pt-1 w-24 text-center">ক্যাশিয়ারের স্বাক্ষর</div>
                </div>
            </div>
        </div>
    </div>

    <div id="print-wrapper" class="hidden"></div>

    <div class="max-w-4xl mx-auto flex gap-4 mt-4 no-print pb-10 px-2">
        <button onclick="generateTwoCopiesAndPrint()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold">প্রিন্ট করুন</button>
        <button onclick="addNewRow(true)" class="bg-green-600 text-white py-3 px-6 rounded-lg font-bold">+ রো যোগ করুন</button>
        <button onclick="clearAllData()" class="bg-red-500 text-white py-3 px-6 rounded-lg font-bold">রিসেট</button>
    </div>

    <script>
        const noteSequence = [1000, 500, 200, 100, 50, 20, 10, 5];

        function addNewRow(shouldFocus = false) {
            const tableBody = document.getElementById('table-body');
            if (tableBody.rows.length >= 15) return; // ১৫টির বেশি রো যাতে পেজ না ভাঙে
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="border border-teal-600 p-1 text-center">${tableBody.rows.length + 1}</td>
                <td class="border border-teal-600 p-1" contenteditable="true"></td>
                <td class="border border-teal-600 p-1 text-center qty" contenteditable="true" oninput="calculate(this)">${noteSequence[tableBody.rows.length] || ''}</td>
                <td class="border border-teal-600 p-1 text-center rate" contenteditable="true" oninput="calculate(this)" onkeydown="checkTab(event, this)">0</td>
                <td class="border border-teal-600 p-1 text-right row-total">0.00</td>
            `;
            tableBody.appendChild(newRow);
            if(shouldFocus) newRow.querySelector('.rate').focus();
        }

        function calculate(el) {
            const row = el.closest('tr');
            let qty = parseFloat(row.querySelector('.qty').innerText) || 0;
            let rate = parseFloat(row.querySelector('.rate').innerText) || 0;
            row.querySelector('.row-total').innerText = (qty * rate).toFixed(2);
            updateGrandTotal();
        }

        function updateGrandTotal() {
            let total = 0;
            document.querySelectorAll('.row-total').forEach(c => total += parseFloat(c.innerText) || 0);
            document.getElementById('grandTotal').innerText = total.toFixed(2);
            document.getElementById('amountInWords').innerText = bngAmountInWords(total);
        }

        function bngAmountInWords(num) {
            const units = ['', 'এক', 'দুই', 'তিন', 'চার', 'পাঁচ', 'ছয়', 'সাত', 'আট', 'নয়'];
            const tens = ['', '', 'বিশ', 'ত্রিশ', 'চল্লিশ', 'পঞ্চাশ', 'ষাট', 'সত্তর', 'আশি', 'নব্বই'];
            const teenagers = ['দশ', 'এগারো', 'বারো', 'তেরো', 'চৌদ্দ', 'পনেরো', 'ষোলো', 'সতেরো', 'আঠারো', 'উনিশ'];
            if (num == 0) return 'শূণ্য টাকা মাত্র।';
            function convert(n) {
                let word = '';
                if (n >= 10000000) { word += convert(Math.floor(n / 10000000)) + ' কোটি '; n %= 10000000; }
                if (n >= 100000) { word += convert(Math.floor(n / 100000)) + ' লাখ '; n %= 100000; }
                if (n >= 1000) { word += convert(Math.floor(n / 1000)) + ' হাজার '; n %= 1000; }
                if (n >= 100) { word += convert(Math.floor(n / 100)) + 'শ '; n %= 100; }
                if (n >= 20) { word += tens[Math.floor(n / 10)]; if (n % 10 > 0) word += ' ' + units[n % 10]; }
                else if (n >= 10) { word += teenagers[n - 10]; }
                else if (n > 0) { word += units[n]; }
                return word;
            }
            return convert(Math.floor(num)).trim() + ' টাকা মাত্র।';
        }

        function generateTwoCopiesAndPrint() {
            const printWrapper = document.getElementById('print-wrapper');
            const designHtml = document.getElementById('main-design').innerHTML;
            printWrapper.innerHTML = `
                <div class="receipt-copy">${designHtml}</div>
                <div class="receipt-copy">${designHtml}</div>
            `;
            window.print();
        }

        function loadSavedData() {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
            if(document.getElementById('table-body').rows.length === 0) {
                for(let i=0; i<3; i++) addNewRow(false); // শুরুতে ৩টি রো থাকবে
            }
        }

        function previewLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('logo-preview').src = e.target.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }
        
        function checkTab(e, el) {
            if (e.key === "Tab" || e.key === "Enter") {
                e.preventDefault();
                addNewRow(true);
            }
        }

        function clearAllData() { if(confirm("রিসেট করবেন?")) location.reload(); }
    </script>
</body>
</html>
